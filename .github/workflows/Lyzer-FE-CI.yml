name: Lyzer-FE CI
on:
  push:
    branches: ["trunk"]
  pull_request:
    branches: ["trunk"]

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18.18"
      - name: Install Dependencies
        working-directory: ./Lyzer-FE
        run: npm CI
      - name: Lint
        working-directory: ./Lyzer-FE
        run: npx eslint . --ext .js,.jsx,.ts,.tsx
      - name: Build
        working-directory: ./Lyzer-FE
        run: npm run build
